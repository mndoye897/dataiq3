<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataIQ — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0a0f;--ink2:#1a1a2a;--paper:#f5f3ef;--paper2:#ede9e3;--gold:#c9a84c;--teal:#00b8a0;--red:#e05252;--muted:#6b6880;--border:rgba(10,10,15,0.1);--r:12px;--r-sm:8px;}
html,body{height:100%;background:var(--ink);font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,184,160,0.06) 0%,transparent 50%);pointer-events:none;}
.card{background:#fff;border-radius:20px;padding:40px;width:420px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,0.4);position:relative;z-index:1;}
.logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);margin-bottom:4px;}
.logo span{color:var(--gold);}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.title{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--paper);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;font-family:'Outfit',sans-serif;color:var(--ink);outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--muted);}
.login-btn{width:100%;padding:13px;border-radius:var(--r-sm);background:var(--ink);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.login-btn:hover{background:var(--ink2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(10,10,15,0.3);}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.error-msg{background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.2);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.default-hint{background:var(--paper);border-radius:var(--r-sm);padding:12px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--border);}
.default-hint strong{color:var(--ink);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.role-badge{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:20px;background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);margin-left:8px;vertical-align:middle;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">Data<span>IQ</span></div>
  <div class="logo-sub">Enterprise Intelligence</div>
  <div class="title">Connexion</div>
  <div class="subtitle">Accédez à votre espace d'analyse</div>

  <div class="form-group">
    <label class="form-label">Nom d'utilisateur</label>
    <input class="form-input" id="username" placeholder="admin" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input class="form-input" id="password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="login-btn" id="loginBtn" onclick="login()">
    <div class="spinner" id="spinner"></div>
    <span id="loginText">Se connecter</span>
  </button>
  <div class="error-msg" id="errorMsg"></div>

  <div class="divider">Compte par défaut</div>
  <div class="default-hint">
    Identifiant : <strong>admin</strong> &nbsp;·&nbsp; Mot de passe : <strong>admin123</strong>
    <span class="role-badge">👑 Admin</span><br>
    <span style="font-size:10px;color:var(--red);margin-top:4px;display:block;">⚠ Changez ce mot de passe en production</span>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showError('Remplissez tous les champs'); return; }
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const txt = document.getElementById('loginText');
  btn.disabled = true; spinner.style.display = 'block'; txt.textContent = 'Connexion…';
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Erreur'); }
    const data = await res.json();
    localStorage.setItem('dataiq_token', data.token);
    localStorage.setItem('dataiq_user', JSON.stringify(data.user));
    window.location.href = '/';
  } catch(err) {
    showError(err.message === 'Identifiants incorrects' ? '❌ Identifiants incorrects' : '❌ ' + err.message);
    btn.disabled = false; spinner.style.display = 'none'; txt.textContent = 'Se connecter';
  }
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
// Auto-focus
document.getElementById('username').focus();
</script>
</body>
</html>
